name: "Security — SAST, Secrets Scan & SBOM"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Block concurrent runs on the same branch (saves CI minutes)
concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Python SAST — Bandit + pip-audit
  # ─────────────────────────────────────────────────────────────────────────────
  sast-python:
    name: "SAST — Python (Bandit + pip-audit)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install SAST tools
        run: pip install bandit pip-audit

      - name: "Bandit — Static Security Analysis (Python)"
        # Fail on HIGH severity issues only (-ll = low level threshold to report, but
        # --exit-zero allows warnings. We use -l to report LOW+ but fail on HIGH+.)
        # Configuration: skips test files and migration scripts
        run: |
          bandit -r . \
            --exclude .venv,test_*.py,generate_hash.py,hash_gen.py,check_syntax.py,create_hash.py \
            --severity-level high \
            --confidence-level medium \
            --format json \
            --output bandit-report.json || true

          # Re-run without JSON for readable output
          bandit -r . \
            --exclude .venv,test_*.py,generate_hash.py,hash_gen.py,check_syntax.py,create_hash.py \
            --severity-level high \
            --confidence-level medium

      - name: "pip-audit — CVE scan of dependencies"
        run: |
          pip-audit \
            --requirement requirements.txt \
            --format=json \
            --output pip-audit-report.json || true

          # Human-readable output
          pip-audit --requirement requirements.txt --format=columns

      - name: Upload SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-python-reports
          path: |
            backend/bandit-report.json
            backend/pip-audit-report.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Frontend SAST — ESLint Security + npm audit
  # ─────────────────────────────────────────────────────────────────────────────
  sast-frontend:
    name: "SAST — Frontend (ESLint + npm audit)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Install ESLint security plugin
        run: npm install --save-dev eslint-plugin-security@latest

      - name: "ESLint — Security lint"
        run: |
          npx eslint . \
            --ext .ts,.tsx \
            --plugin security \
            --rule '{"security/detect-object-injection": "warn", "security/detect-non-literal-regexp": "warn", "security/detect-possible-timing-attacks": "warn"}' \
            --format json \
            --output-file eslint-security-report.json || true

          # Human-readable pass
          npx eslint . --ext .ts,.tsx --max-warnings 0 --format stylish || echo "::warning::ESLint security warnings found"

      - name: "npm audit — CVE scan"
        run: |
          npm audit --json > npm-audit-report.json || true
          npm audit --audit-level=high

      - name: Upload Frontend SAST reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sast-frontend-reports
          path: |
            frontend/eslint-security-report.json
            frontend/npm-audit-report.json
          retention-days: 90

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Secrets Scan — TruffleHog (incremental, not full history on PRs)
  # ─────────────────────────────────────────────────────────────────────────────
  secrets-scan:
    name: "Secrets Scan — TruffleHog"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for main branch, shallow for PRs is handled below

      - name: "TruffleHog — Scan for leaked secrets"
        uses: trufflesecurity/trufflehog@main
        with:
          # On push to main: scan last 10 commits
          # On PR: scan only the PR diff (base...head)
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'HEAD~10' }}
          head: HEAD
          extra_args: --only-verified --json

      - name: Fail on verified secrets
        if: failure()
        run: |
          echo "::error::TruffleHog detected VERIFIED secrets in this commit. Remove them and rotate credentials immediately."
          exit 1

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 4: SBOM Generation — CycloneDX
  # ─────────────────────────────────────────────────────────────────────────────
  sbom-generate:
    name: "SBOM — CycloneDX 1.4"
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'   # Only generate on main (not PRs)
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies (for SBOM introspection)
        run: pip install -r requirements.txt

      - name: "Generate CycloneDX SBOM"
        run: python sbom_generator.py --output sbom-backend.json
        continue-on-error: true   # GPL warning exits 2 — don't fail build, just alert

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-backend
          path: backend/sbom-backend.json
          retention-days: 365  # Keep SBOM for 1 year (MCI compliance)

      - name: Commit updated SBOM to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(security): auto-update SBOM [skip ci]"
          file_pattern: backend/sbom-backend.json
          commit_user_name: "SBOM Bot"
          commit_user_email: "actions@orbesystems.com.br"
